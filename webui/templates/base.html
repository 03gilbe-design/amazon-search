<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer"/>
  <title>{% block title %}amazon·search{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <link rel="stylesheet" href="/static/style.css"/>
  {% block head %}{% endblock %}
</head>
<body>
<div class="app" id="app">

<aside class="sidebar" id="sidebar">
  <a class="sb-brand" href="/">
    <span class="sb-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="21" y2="21"/></svg>
    </span>
    <span class="sb-brand-txt">
      <b>amazon<em>·</em>search</b>
      <small>search · clean · keep the best</small>
    </span>
  </a>

  <nav class="sb-nav">
    <a class="sb-link {% if active=='search' %}on{% endif %}" href="/" title="Search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Search</span>
    </a>
    {% if last_job_id %}
    <a class="sb-link {% if active=='report' %}on{% endif %}" href="/report/{{ last_job_id }}" title="Report">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h7M7 16h4"/></svg>
      <span>Report</span>
    </a>
    <a class="sb-link {% if active=='categorize' %}on{% endif %}" href="/categorize/{{ last_job_id }}" title="Categorize">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Categorize</span>
    </a>
    {% endif %}
    <a class="sb-link" href="/categorize/dataset" title="Dataset lab">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5.5" rx="8" ry="2.8"/><path d="M4 5.5V18c0 1.6 3.6 2.8 8 2.8s8-1.2 8-2.8V5.5M4 12c0 1.6 3.6 2.8 8 2.8s8-1.2 8-2.8"/></svg>
      <span>Dataset lab</span>
    </a>
    <a class="sb-link {% if active=='settings' %}on{% endif %}" href="/settings" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2.1 2.1M17.3 17.3l2.1 2.1M4.6 19.4l2.1-2.1M17.3 6.7l2.1-2.1"/></svg>
      <span>Settings</span>
    </a>
  </nav>

  <div class="sb-foot">
    <div class="sb-lang" role="group" aria-label="Language">
      <button data-lang="en" title="English">
        <svg width="16" height="12" viewBox="0 0 20 14"><rect width="20" height="14" fill="#1a3a7a"/><path d="M0 0l20 14M20 0L0 14" stroke="#fff" stroke-width="2.6"/><path d="M10 0v14M0 7h20" stroke="#fff" stroke-width="4.4"/><path d="M10 0v14M0 7h20" stroke="#c0392b" stroke-width="2.2"/></svg>
      </button>
      <button data-lang="it" title="Italiano">
        <svg width="16" height="12" viewBox="0 0 20 14"><rect width="7" height="14" fill="#149144"/><rect x="7" width="6" height="14" fill="#fff"/><rect x="13" width="7" height="14" fill="#c0392b"/></svg>
      </button>
    </div>
    <button class="sb-collapse" id="sb-collapse" title="Collapse sidebar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
  </div>
</aside>

<main class="main">
{% block body %}{% endblock %}
</main>
</div>

<script>
// sidebar collapse persistente (pattern Layout.jsx: --nav-w + localStorage)
(function() {
  const app = document.getElementById('app');
  const btn = document.getElementById('sb-collapse');
  const apply = c => { app.classList.toggle('collapsed', c); localStorage.setItem('nav-collapsed', c); };
  apply(localStorage.getItem('nav-collapsed') === 'true');
  btn.onclick = () => apply(!app.classList.contains('collapsed'));
  // lingua: bandiere ovunque; se la pagina ha setLang lo usa, sennò salva solo
  const cur = localStorage.getItem('ui_lang') || 'en';
  document.querySelectorAll('.sb-lang button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === cur);
    b.onclick = () => {
      localStorage.setItem('ui_lang', b.dataset.lang);
      document.querySelectorAll('.sb-lang button').forEach(x => x.classList.toggle('on', x === b));
      if (typeof window.setLang === 'function') window.setLang(b.dataset.lang);
    };
  });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
