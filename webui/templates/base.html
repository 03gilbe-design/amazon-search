<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}amazon·search{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <link rel="stylesheet" href="/static/style.css"/>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">amazon<em>·</em>search</a>
  <div class="nav-links">
    <a class="nav-link {% if active=='search' %}active{% endif %}" href="/">
      <!-- search icon -->
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-right:3px">
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Search
    </a>
    {% if last_job_id %}
    <a class="nav-link {% if active=='report' %}active{% endif %}" href="/report/{{ last_job_id }}">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-right:3px">
        <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Last report
    </a>
    <a class="nav-link {% if active=='categorize' %}active{% endif %}" href="/categorize/{{ last_job_id }}">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-right:3px">
        <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      Categorize
    </a>
    {% endif %}
    <a class="nav-link {% if active=='settings' %}active{% endif %}" href="/settings">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="vertical-align:middle;margin-right:3px">
        <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.3 3.3l1.4 1.4M11.3 11.3l1.4 1.4M3.3 12.7l1.4-1.4M11.3 4.7l1.4-1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Settings
    </a>
  </div>
  <div class="nav-right">
    {% block nav_right %}{% endblock %}
  </div>
</nav>

{% block body %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
