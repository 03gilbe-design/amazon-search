<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .left { transform-origin: 30px 50px; animation: mergeL 1100ms cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate; }
    .right { transform-origin: 70px 50px; animation: mergeR 1100ms cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate; }
    .glow { transform-origin: 50px 50px; animation: shine 1100ms cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate; }
    @keyframes mergeL { 0% { transform: translateX(-20px); } 100% { transform: translateX(20px) scale(0.5); opacity: 0; } }
    @keyframes mergeR { 0% { transform: translateX(20px); } 100% { transform: translateX(-20px) scale(0.5); opacity: 0; } }
    @keyframes shine { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.5); opacity: 1; } }
  </style>
  <rect x="15" y="35" width="30" height="30" fill="currentColor" rx="4" class="left"/>
  <rect x="55" y="35" width="30" height="30" fill="currentColor" rx="4" class="right"/>
  <rect x="35" y="35" width="30" height="30" fill="var(--anim-accent, #e47911)" rx="4" class="glow"/>
</svg>
