<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .box { transform-origin: center; animation: cluster 900ms cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate; }
    .b1 { animation-delay: 0ms; }
    .b2 { animation-delay: 50ms; }
    .b3 { animation-delay: 100ms; }
    .b4 { animation-delay: 150ms; }
    @keyframes cluster {
      0% { transform: translate(0, 0) scale(0.5); }
      100% { transform: translate(var(--tx), var(--ty)) scale(1); }
    }
  </style>
  <g fill="currentColor">
    <rect x="40" y="40" width="20" height="20" class="box b1" style="--tx:-20px; --ty:-20px;" rx="4"/>
    <rect x="40" y="40" width="20" height="20" class="box b2" style="--tx:20px; --ty:-20px;" rx="4" fill="var(--anim-accent, #e47911)"/>
    <rect x="40" y="40" width="20" height="20" class="box b3" style="--tx:-20px; --ty:20px;" rx="4" fill="var(--anim-accent, #e47911)"/>
    <rect x="40" y="40" width="20" height="20" class="box b4" style="--tx:20px; --ty:20px;" rx="4"/>
  </g>
</svg>
